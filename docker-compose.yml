services:
  db:
    image: postgres:16-alpine
    container_name: systock-db
    environment:
      POSTGRES_DB: systock
      POSTGRES_USER: systock
      POSTGRES_PASSWORD: systock_dev
    ports:
      - "5432:5432"
    volumes:
      - systock_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U systock -d systock"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
    container_name: systock-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/systock
      DB_USER: systock
      DB_PASSWORD: systock_dev
      SYSTOCK_CRYPTO_KEY: b43135798b3b053e65487699f5e30f80
    ports:
      - "8080:8080"

volumes:
  systock_db_data:
