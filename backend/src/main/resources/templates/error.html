<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head th:replace="~{fragments/layout :: head('Erro')}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <h1>Algo deu errado</h1>

    <div style="background: #fff5f5; border-left: 4px solid #d73a49; padding: 1rem; margin: 1.5rem 0;">
        <p style="margin: 0;">
            <strong>Código:</strong>
            <span th:text="${status}">500</span>
            &middot;
            <span th:text="${error}">Internal Server Error</span>
        </p>
        <p style="margin: 0.5rem 0 0 0; color:#666;" th:if="${message != null and message != ''}"
           th:text="${message}">Mensagem detalhada.</p>
    </div>

    <p>
        <a th:href="@{/}" style="display:inline-block; background:#0366d6; color:white; padding:0.5rem 1rem; border-radius:4px; text-decoration:none;">
            Voltar ao painel
        </a>
    </p>

    <p style="color:#999; font-size: 0.85rem; margin-top: 2rem;">
        Se o problema persistir, contate o administrador do sistema.
    </p>
</body>
</html>
