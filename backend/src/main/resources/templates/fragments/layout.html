<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <title th:text="|Systock — ${titulo}|">Systock</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; color: #222; }
        h1 { border-bottom: 1px solid #ddd; padding-bottom: 0.5rem; }
        nav { margin-bottom: 1.5rem; }
        nav a { margin-right: 1rem; color: #0366d6; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { border: 1px solid #e1e4e8; padding: 0.5rem 0.75rem; text-align: left; }
        th { background: #f6f8fa; }
        form { margin: 1rem 0; }
        input[type=text] { padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px; width: 280px; }
        button { padding: 0.45rem 0.9rem; border: 0; border-radius: 4px; cursor: pointer; }
        button.primary { background: #0366d6; color: white; }
        button.danger { background: #d73a49; color: white; }
        button.link { background: none; color: #0366d6; padding: 0; text-decoration: underline; }
        .erro { color: #d73a49; margin: 0.5rem 0; }
        .sucesso { color: #28a745; margin: 0.5rem 0; }
        .validacao { color: #d73a49; font-size: 0.9rem; }
    </style>
</head>
<body th:fragment="navbar">
    <nav>
        <a th:href="@{/categorias}">Categorias</a>
        <a href="#">Produtos</a>
        <a href="#">Clientes</a>
        <a href="#">Vendas</a>
    </nav>
</body>
</html>
