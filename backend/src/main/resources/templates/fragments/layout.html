<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-br">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="|Systock — ${titulo}|">Systock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/systock.css}">
</head>
<body th:fragment="navbar">
    <nav>
        <span>
            <a th:href="@{/}">Painel</a>
            <a th:href="@{/categorias}">Categorias</a>
            <a th:href="@{/fornecedores}">Fornecedores</a>
            <a th:href="@{/produtos}">Produtos</a>
            <a href="#" class="disabled">Clientes</a>
            <a href="#" class="disabled">Vendas</a>
        </span>
        <span sec:authorize="isAuthenticated()">
            <span class="user-info" sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" style="display:inline; margin:0;">
                <button type="submit" class="link">Sair</button>
            </form>
        </span>
    </nav>
</body>
</html>
