<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-br">
<head th:replace="~{fragments/layout :: head('Novo produto')}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <h1>Novo produto</h1>

    <p class="erro" th:if="${erro}" th:text="${erro}"></p>

    <form th:action="@{/produtos}" th:object="${form}" method="post">
        <div class="grid-form">
            <div>
                <label>Código *</label><br>
                <input type="text" th:field="*{codigo}" autofocus>
                <p class="validacao" th:if="${#fields.hasErrors('codigo')}" th:errors="*{codigo}"></p>
            </div>
            <div>
                <label>Nome *</label><br>
                <input type="text" th:field="*{nome}">
                <p class="validacao" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>
            </div>
            <div class="span-2">
                <label>Descrição</label><br>
                <input type="text" th:field="*{descricao}" style="width: 100%;">
                <p class="validacao" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></p>
            </div>
            <div>
                <label>Categoria *</label><br>
                <select th:field="*{categoriaId}" style="width: 100%; padding: 0.4rem;">
                    <option value="">Selecione...</option>
                    <option th:each="c : ${categoriasDisponiveis}"
                            th:value="${c.id}"
                            th:text="${c.nome}"></option>
                </select>
                <p class="validacao" th:if="${#fields.hasErrors('categoriaId')}" th:errors="*{categoriaId}"></p>
            </div>
            <div>
                <label>Fornecedor *</label><br>
                <select th:field="*{fornecedorId}" style="width: 100%; padding: 0.4rem;">
                    <option value="">Selecione...</option>
                    <option th:each="f : ${fornecedoresDisponiveis}"
                            th:value="${f.id}"
                            th:text="${f.razaoSocial}"></option>
                </select>
                <p class="validacao" th:if="${#fields.hasErrors('fornecedorId')}" th:errors="*{fornecedorId}"></p>
            </div>
            <div>
                <label>Preço de custo *</label><br>
                <input type="number" step="0.01" min="0" th:field="*{precoCusto}">
                <p class="validacao" th:if="${#fields.hasErrors('precoCusto')}" th:errors="*{precoCusto}"></p>
            </div>
            <div>
                <label>Preço de venda *</label><br>
                <input type="number" step="0.01" min="0" th:field="*{precoVenda}">
                <p class="validacao" th:if="${#fields.hasErrors('precoVenda')}" th:errors="*{precoVenda}"></p>
            </div>
            <div>
                <label>Estoque inicial *</label><br>
                <input type="number" min="0" th:field="*{estoqueAtual}">
                <p class="validacao" th:if="${#fields.hasErrors('estoqueAtual')}" th:errors="*{estoqueAtual}"></p>
            </div>
            <div>
                <label>Estoque mínimo *</label><br>
                <input type="number" min="0" th:field="*{estoqueMinimo}">
                <p class="validacao" th:if="${#fields.hasErrors('estoqueMinimo')}" th:errors="*{estoqueMinimo}"></p>
            </div>
        </div>
        <br>
        <button type="submit" class="primary">Cadastrar produto</button>
        <a th:href="@{/produtos}">Cancelar</a>
    </form>
</body>
</html>
