<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="pt-br">
<head th:replace="~{fragments/layout :: head('Painel')}"></head>
<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <h1>Painel</h1>
    <p>Bem-vindo, <span sec:authentication="name"></span>. Visão geral do sistema.</p>

    <div class="grid-cards">

        <div class="card">
            <p class="card-label">Categorias</p>
            <p class="card-value brand" th:text="${metrics.totalCategorias()}">0</p>
            <a class="card-link" th:href="@{/categorias}">Ver todas →</a>
        </div>

        <div class="card">
            <p class="card-label">Fornecedores ativos</p>
            <p class="card-value success" th:text="${metrics.totalFornecedoresAtivos()}">0</p>
            <a class="card-link" th:href="@{/fornecedores}">Ver todos →</a>
        </div>

        <div class="card">
            <p class="card-label">Produtos</p>
            <p class="card-value brand" th:text="${metrics.totalProdutos()}">0</p>
            <a class="card-link" th:href="@{/produtos}">Ver todos →</a>
        </div>

        <div th:classappend="${metrics.produtosEmEstoqueCritico() > 0} ? 'card alert' : 'card'">
            <p class="card-label">Estoque crítico</p>
            <p th:classappend="${metrics.produtosEmEstoqueCritico() > 0} ? 'card-value danger' : 'card-value'"
               th:text="${metrics.produtosEmEstoqueCritico()}">0</p>
            <a class="card-link" th:href="@{/produtos}">Ver detalhes →</a>
        </div>

    </div>

    <div class="painel-info">
        <p><strong>Systock v1.0</strong> &middot; Plataforma de gestão para microempresas de varejo de eletrônicos</p>
    </div>

</body>
</html>
